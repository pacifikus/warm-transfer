site_name: warm-transfer
site_description: Model-agnostic library for transferring recommender scores to cold-start items + benchmark
site_url: https://pacifikus.github.io/warm-transfer/
docs_dir: docs

validation:
  nav:
    omitted_files: ignore       # individual runs in results/ are intentionally not in nav
  absolute_links: ignore
  unrecognized_links: ignore

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight

nav:
  - Home: index.md
  - Methods: methods.md
  - Datasets: datasets.md
  - Evaluation protocol: eval-protocol.md
  - Results:
      - Full matrix 3×3: results/full_matrix.md
      - Seed variance: results/seeds.md
      - Deep / [EMB]: results/deep.md
      - KION text vs categories: results/kion_text.md
  - API Reference: api.md

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
          nav_translations:
            Home: Главная
            Methods: Методы
            Datasets: Датасеты
            Evaluation protocol: Протокол оценки
            Results: Результаты
            Full matrix 3×3: Полная матрица 3×3
            Seed variance: Разброс по сидам
            KION text vs categories: KION текст vs категории
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: sphinx
            show_source: false
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true
