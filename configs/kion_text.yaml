# KION content comparison: categorical (kion) vs TF-IDF text (kion-text).
# Goal: check whether rich text content improves score transfer to cold items.

datasets:
  - kion
  - kion-text

donors:
  - name: als
    params:
      factors: 64
      regularization: 0.05
      iterations: 20

methods:
  - name: grouped_most_popular_pers
  - name: knn_score_avg
    params:
      k: 20
  - name: linmap
  - name: stacking_plus

splitter:
  name: pseudo_cold
  params:
    cold_frac: 0.2
    val_frac: 0.1
    n_pop_buckets: 5
    min_item_interactions: 5

metrics_ks: [1, 5, 10]
seeds: [42]
max_eval_users: 2000
out_dir: docs/results
