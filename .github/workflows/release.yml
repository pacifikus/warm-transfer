name: release

# Publish to PyPI on a git tag like v0.1.0 via Trusted Publishing (OIDC).
# No tokens needed: in the warm-transfer project settings on PyPI, register a
# trusted publisher once — repository pacifikus/warm-transfer, workflow
# release.yml, environment pypi. After that `git tag v0.1.0 && git push --tags`
# builds and publishes the release automatically.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (trusted publishing)
        run: uv publish --trusted-publishing always
