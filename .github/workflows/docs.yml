name: docs

# Build and publish the documentation to GitHub Pages.
# Triggered on push to the GitHub repository (Settings → Pages → Source: GitHub Actions).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install image processing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libfreetype6 libffi-dev libjpeg-dev libpng-dev
      - name: Check quickstart example
        run: uv run python examples/quickstart.py
      - name: Build site
        run: uv run --group docs mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
